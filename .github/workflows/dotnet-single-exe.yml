name: Автосборка Music M от Werhes

on:
  workflow_dispatch:
    inputs:
      namevers:
        description: "Название релиза"
        required: true
        default: "🤖 Автосборка (Один файл)"
      descr:
        description: "Описание релиза"
        required: true
        default: "❌ Описание сборки отсутствует"
      release:
        description: "Выкинуть в релиз?"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Пререлиз?"
        required: true
        default: true
        type: boolean

  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-single-exe-all:
    runs-on: windows-latest
    env:
      Solution_Name: "VK UI3"
      Configuration: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Фиксируем SDK 8.0
      - name: Pin .NET SDK 8 via global.json
        run: |
          Set-Content -Path global.json -Value '{ "sdk": { "version": "8.0.100", "rollForward": "feature" } }'

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # PFX
      - name: Decode PFX
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
          $certPath = "${{ github.workspace }}\signcert.pfx"
          [IO.File]::WriteAllBytes($certPath, $bytes)

      # 1. Публикация в один файл (Single-file)
      - name: Publish Single-File Executables
        shell: pwsh
        run: |
          # Предварительное восстановление пакетов для всех архитектур.
          # Это предотвращает поломку project.assets.json и кэша XamlCompiler при кросс-компиляции
          dotnet restore "$env:Solution_Name\$env:Solution_Name.csproj" -r win-x64
          dotnet restore "$env:Solution_Name\$env:Solution_Name.csproj" -r win-x86
          dotnet restore "$env:Solution_Name\$env:Solution_Name.csproj" -r win-arm64
          
          $arches = @(
            @{ Platform = "x64";   RID = "win-x64"   },
            @{ Platform = "x86";   RID = "win-x86"   },
            @{ Platform = "ARM64"; RID = "win-arm64" }
          )
      
          foreach ($a in $arches) {
            Write-Host "=== Publish $($a.Platform) ==="
            
            # Отключаем фоновые процессы MSBuild для освобождения файлов между сборками
            dotnet build-server shutdown

            dotnet publish "$env:Solution_Name\$env:Solution_Name.csproj" `
              -c $env:Configuration `
              -r $($a.RID) `
              --self-contained true `
              --no-restore `
              -p:PublishSingleFile=true `
              -p:EnableMsixTooling=true `
              -p:IncludeNativeLibrariesForSelfExtract=true `
              -p:Platform=$($a.Platform) `
              -p:PlatformTarget=$($a.Platform) `
              -p:DisableRuntimeIdentifierInference=true `
              -p:EnableNETAnalyzers=false `
              -p:WarningLevel=0 `
              -o "publish\$($a.Platform)"
              
            # Переименовываем собранный exe, чтобы было удобно прикреплять к релизу
            $exePath = "publish\$($a.Platform)\$env:Solution_Name.exe"
            if (Test-Path $exePath) {
               Rename-Item $exePath "VK_UI3_$($a.Platform).exe"
            }
          }

      # 2. Подпись
      - name: Sign executables
        shell: pwsh
        run: |
          $certPath = "${{ github.workspace }}\signcert.pfx"
          $password = "${{ secrets.PFX_PASSWORD }}"
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
                      Where-Object { $_.FullName -match 'x64' } |
                      Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe не найден" }
      
          Get-ChildItem "publish" -Recurse -Filter "VK_UI3_*.exe" | ForEach-Object {
            & $signtool sign /f $certPath /p $password /tr http://timestamp.digicert.com /td sha256 /fd sha256 $_.FullName
          }

      # 3. Загрузка в релиз
      - name: Извлечь версию
        id: get_version
        shell: pwsh
        run: |
          $csprojPath = "${{ github.workspace }}\$env:Solution_Name\$env:Solution_Name.csproj"
          [xml]$doc = Get-Content $csprojPath
          $version = $doc.SelectSingleNode('//AppxPackageVersion').InnerText
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Версия: $version"

      - name: Upload exes to release
        uses: svenstaro/upload-release-action@v2
        if: github.event.inputs.release == 'true'
        with:
          repo_token: ${{ secrets.TOKEN }}
          file: publish/*/VK_UI3_*.exe
          tag: ${{ steps.get_version.outputs.VERSION }}
          overwrite: true
          file_glob: true

      # 4. Уведомление в Telegram
      - name: Отправить сообщение в Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.VERSION }}
        run: |
          $telegramBotToken = '${{ secrets.TELEGRAM_BOT_TOKEN }}'
          $telegramChatId = '${{ secrets.TELEGRAM_CHAT_ID }}'
          $releaseUrl = 'https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.VERSION }}'
          $message = @"
          <b>🎉 Новый релиз:</b> ${{ github.event.inputs.namevers }}
          <b>📦 Версия:</b> ${{ steps.get_version.outputs.VERSION }}
          <b>📝 Описание:</b> ${{ github.event.inputs.descr }}
          <b>🔗 <a href='$releaseUrl'>Ссылка на релиз</a></b>
          "@
          $uri = 'https://api.telegram.org/bot' + $telegramBotToken + '/sendMessage'
          $body = @{
              chat_id = $telegramChatId
              text = $message
              parse_mode = 'HTML'
          }
          $bodyJson = $body | ConvertTo-Json -Compress
          Invoke-RestMethod -Uri $uri -Method Post -Body $bodyJson -ContentType 'application/json'
        if: github.event.inputs.release == 'true'
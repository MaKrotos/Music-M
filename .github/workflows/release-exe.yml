name: Release Single Exe

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Тег релиза (например, v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Название релиза'
        required: true
        default: 'VK M Update'
      release_description:
        description: 'Описание релиза'
        required: false
        default: 'Исправления и улучшения в этой версии.'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # Необходимо для создания релиза

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish and Rename Single-File Exes
      run: |
        $arches = @(
          @{ Platform = "x64";   RID = "win-x64"   },
          @{ Platform = "x86";   RID = "win-x86"   },
          @{ Platform = "ARM64"; RID = "win-arm64" }
        )
        foreach ($a in $arches) {
          $plat = $a.Platform
          $rid = $a.RID
          $publishDir = "publish/$rid"
          Write-Host "Building for $rid ($plat) into $publishDir"
          dotnet publish "VK UI3/VK UI3.csproj" -c Release -p:Platform=$plat -r $rid --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:WindowsAppSDKSelfContained=true -o $publishDir
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Build failed for $rid. Check logs above."
            exit 1
          }

          # Переименовываем exe, чтобы файлы не перезаписали друг друга в релизе
          $exePath = Get-ChildItem -Path "$publishDir/*.exe" -File | Select-Object -First 1
          if ($exePath) {
            $newName = "$($exePath.BaseName)-$rid$($exePath.Extension)"
            Rename-Item -Path $exePath.FullName -NewName $newName
            Write-Host "Renamed to $newName"
          } else {
            Write-Error "Could not find EXE in $publishDir"
            exit 1
          }
        }
      shell: pwsh

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.tag_name }}
        name: ${{ github.event.inputs.release_name }}
        body: ${{ github.event.inputs.release_description }}
        files: 'publish/**/*.exe'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
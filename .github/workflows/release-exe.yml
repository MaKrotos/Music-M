name: Release Single Exe

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Тег релиза (например, v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Название релиза'
        required: true
        default: 'VK M Update'
      release_description:
        description: 'Описание релиза'
        required: false
        default: 'Исправления и улучшения в этой версии.'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # Необходимо для создания релиза

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish and Rename Single-File Exes
      run: |
        $rids = @("win-x64", "win-x86", "win-arm64")
        foreach ($rid in $rids) {
          $publishDir = "publish/$rid"
          Write-Host "Building for $rid into $publishDir"
          dotnet publish "VK UI3/VK UI3.csproj" -c Release -r $rid --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:WindowsAppSDKSelfContained=true -o $publishDir
          
          # Переименовываем exe, чтобы файлы не перезаписали друг друга в релизе
          $exePath = Get-ChildItem -Path "$publishDir/*.exe" -File | Select-Object -First 1
          if ($exePath) {
            $newName = "$($exePath.BaseName)-$rid$($exePath.Extension)"
            Rename-Item -Path $exePath.FullName -NewName $newName
            Write-Host "Renamed to $newName"
          } else {
            Write-Host "WARNING: Could not find EXE in $publishDir"
          }
        }
      shell: pwsh

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.tag_name }}
        name: ${{ github.event.inputs.release_name }}
        body: ${{ github.event.inputs.release_description }}
        files: 'publish/**/*.exe'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
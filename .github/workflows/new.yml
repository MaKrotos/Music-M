          path: |
            ~/.nuget/packages
            C:\ProgramData\Microsoft\VisualStudio\Packages
            C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild
            C:\Program Files\dotnet\sdk
          key: ${{ needs.prepare.outputs.CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Установить .NET Core (если кэш не сработал)
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Установить MSBuild (если кэш не сработал)
        if: steps.cache.outputs.cache-hit != 'true'
        uses: microsoft/setup-msbuild@v2

      - name: Восстановить сертификат из кэша
        uses: actions/cache@v3
        with:
          path: |
            ${{ github.workspace }}\GitHubActionsWorkflow.pfx
          key: cert-${{ secrets.BASE64_ENCODED_PFX }}-${{ secrets.PFX_PASSWORD }}
          fail-on-cache-miss: true

      - name: Собрать EXE ARM64
        run: |
          msbuild "$env:Solution_Name_Unpacked\$env:Solution_Name_Unpacked.csproj" `
            "/p:Configuration=$env:Configuration_unpacked" `
            "/p:Platform=ARM64" `
            "/p:RuntimeIdentifier=win-arm64" `
            /restore `
            /p:DisableRuntimeIdentifierInference=true `
            /p:EnableNETAnalyzers=false `
            /p:WarningLevel=0 `
            /p:TreatWarningsAsErrors=false `
            /clp:ErrorsOnly

      - name: Подписать EXE ARM64
        run: |
          $certPath = "${{ github.workspace }}\GitHubActionsWorkflow.pfx"
          $password = "${{ secrets.PFX_PASSWORD }}"
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
                      Where-Object { $_.FullName -match 'x64' } |
                      Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe не найден" }
          $exe = Get-ChildItem "$env:Solution_Name_Unpacked\bin\ARM64\$env:Configuration_unpacked" -Recurse -Include *.exe | Select-Object -First 1
          if (-not $exe) { throw "Не найден exe для ARM64" }
          & $signtool sign /f $certPath /p $password /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exe.FullName

      - name: Упаковать папку сборки ARM64
        run: |
          $buildDir = Join-Path "$env:Solution_Name_Unpacked\bin" "ARM64\$env:Configuration_unpacked"
          if (-not (Test-Path $buildDir)) { throw "Папка сборки для ARM64 не найдена" }
          $zipName = "VK_UI3_ARM64.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "$buildDir\*" -DestinationPath $zipName -Force

      - name: Загрузить EXE ARM64
        uses: actions/upload-artifact@v4
        with:
          name: EXE_ARM64
          path: VK_UI3_ARM64.zip
          retention-days: 30

  # ============ JOB 9: Создание релиза ============
  create_release:
    needs: [prepare, build_msix_x64, build_msix_x86, build_msix_arm64, build_exe_x64, build_exe_x86, build_exe_arm64]
    runs-on: windows-latest
    if: github.event.inputs.release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Загрузить все артефакты
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Проверить существование релиза
        id: check_release
        run: |
          $version = "${{ needs.prepare.outputs.VERSION }}"
          $headers = @{
            "Authorization" = "token ${{ secrets.TOKEN }}"
            "Accept" = "application/vnd.github.v3+json"
          }
          try {
            $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases" -Headers $headers
            $release = $releases | Where-Object { $_.tag_name -eq $version -and $_.draft -eq $false -and $_.prerelease -eq $false }
            if ($release) {
              Write-Host "Релиз с тегом $version уже существует"
              echo "exists=true" >> $env:GITHUB_OUTPUT
            } else {
              Write-Host "Релиз с тегом $version не найден"
              echo "exists=false" >> $env:GITHUB_OUTPUT
            }
          } catch {
            Write-Host "Ошибка при проверке релизов: $($_.Exception.Message)"
            echo "exists=false" >> $env:GITHUB_OUTPUT
          }

      - name: Создать релиз
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          tag_name: ${{ needs.prepare.outputs.VERSION }}
          name: ${{ github.event.inputs.namevers }}
          body: ${{ github.event.inputs.descr }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: false
        if: steps.check_release.outputs.exists == 'false'

      - name: Загрузить все артефакты в релиз
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.TOKEN }}
          file: artifacts/**/*
          tag: ${{ needs.prepare.outputs.VERSION }}
          overwrite: true
          file_glob: true
        if: steps.check_release.outputs.exists == 'false'

      - name: Отправить сообщение в Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          $version = "${{ needs.prepare.outputs.VERSION }}"
          $releaseUrl = "https://github.com/${{ github.repository }}/releases/tag/$version"
          $message = @"
          <b>🎉 Новый релиз:</b> ${{ github.event.inputs.namevers }}
          <b>📦 Версия:</b> $version
          <b>📝 Описание:</b> ${{ github.event.inputs.descr }}
          <b>🔗 <a href='$releaseUrl'>Ссылка на релиз</a></b>
          "@
          $uri = 'https://api.telegram.org/bot' + '${{ secrets.TELEGRAM_BOT_TOKEN }}' + '/sendMessage'
          $body = @{
              chat_id = '${{ secrets.TELEGRAM_CHAT_ID }}'
              text = $message
              parse_mode = 'HTML'
          }
          $bodyJson = $body | ConvertTo-Json -Compress
          Invoke-RestMethod -Uri $uri -Method Post -Body $bodyJson -ContentType 'application/json'
        if: steps.check_release.outputs.exists == 'false'
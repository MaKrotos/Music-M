          if (-not (Test-Path $buildDir)) { throw "Папка сборки для x86 не найдена" }
          $zipName = "VK_UI3_x86.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "$buildDir\*" -DestinationPath $zipName -Force

      - name: Загрузить EXE x86
        uses: actions/upload-artifact@v4
        with:
          name: EXE_x86
          path: VK_UI3_x86.zip
          retention-days: 30

  # ============ JOB 8: Сборка EXE ARM64 ============
  build_exe_arm64:
    needs: [prepare, setup]
    runs-on: windows-latest
    env:
      Solution_Name_Unpacked: "VK UI3"
      Configuration_unpacked: Unpacked
    steps:

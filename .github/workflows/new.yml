name: Автосборка Music M

on:
  workflow_dispatch:
    inputs:
      namevers:
        description: "Название релиза"
        required: true
        default: "🤖 Автосборка"
      descr:
        description: "Описание релиза"
        required: true
        default: "❌ Описание сборки отсутствует"
      release:
        description: "Выкинуть в релиз?"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Пререлиз?"
        required: true
        default: true
        type: boolean

  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============ JOB 1: Подготовка ============
  prepare:
    runs-on: windows-latest
    outputs:
      VERSION: ${{ steps.get_version.outputs.VERSION }}
      CHANGELOG: ${{ steps.changelog.outputs.CHANGELOG }}
      SOURCE_CHANGED: ${{ steps.check_changes.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Извлечь версию
        id: get_version
        run: |
          $repoName = "${{ github.repository }}".Split('/')[1]
          $csprojPath = "D:\a\$repoName\$repoName\VK UI3\VK UI3.csproj"
          $doc = New-Object xml
          $doc.Load((Convert-Path $csprojPath))
          $version = $doc.SelectSingleNode('//AppxPackageVersion').InnerText
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Версия: $version"

      - name: Проверить изменения в коде
        id: check_changes
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: |
          $files = git diff --name-only HEAD^ HEAD
          $changed = $files | Where-Object { $_ -match '^VK UI3/' -or $_ -match '^VK UI3 \(Package\)/' }
          if ($changed) {
            echo "changed=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "changed=false" >> $env:GITHUB_OUTPUT
          }

      - name: Генерация CHANGELOG
        id: changelog
        run: |
          $commits = git log --oneline --pretty=format:"- %s" -10
          $changelog = $commits -join "`n"
          echo "CHANGELOG<<EOF" >> $env:GITHUB_OUTPUT
          echo "$changelog" >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

  # ============ JOB 2: Установка зависимостей (быстрая) ============
  setup:
    needs: prepare
    runs-on: windows-latest
    if: needs.prepare.outputs.SOURCE_CHANGED == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ⚡ БЫСТРОЕ КЭШИРОВАНИЕ NuGet (только пакеты, без метаданных)
      - name: Cache NuGet packages (быстрый)
        uses: actions/cache@v3
        id: nuget_cache
        with:
          path: |
            ~/.nuget/packages
            !~/.nuget/packages/**/*.cache
            !~/.nuget/packages/**/*.nupkg.metadata
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # ⚡ КЭШИРОВАНИЕ ТОЛЬКО MSBuild (без всего Visual Studio)
      - name: Cache MSBuild (быстрый)
        uses: actions/cache@v3
        id: msbuild_cache
        with:
          path: |
            C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin
          key: msbuild-${{ runner.os }}-${{ hashFiles('**/*.wapproj') }}
          restore-keys: |
            msbuild-${{ runner.os }}-

      # ⚡ Установка .NET (только если нет кэша)
      - name: Setup .NET Core
        if: steps.nuget_cache.outputs.cache-hit != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ⚡ Установка MSBuild (только если нет кэша)
      - name: Setup MSBuild
        if: steps.msbuild_cache.outputs.cache-hit != 'true'
        uses: microsoft/setup-msbuild@v2

      # ⚡ РАЗДЕЛЬНОЕ КЭШИРОВАНИЕ - быстрее загружается
      - name: Cache .NET SDK
        uses: actions/cache@v3
        with:
          path: C:\Program Files\dotnet\sdk
          key: dotnet-sdk-${{ runner.os }}-8.0
          restore-keys: |
            dotnet-sdk-${{ runner.os }}-

      - name: Cache Windows SDK
        uses: actions/cache@v3
        with:
          path: C:\Program Files (x86)\Windows Kits\10\bin
          key: winsdk-${{ runner.os }}-10
          restore-keys: |
            winsdk-${{ runner.os }}-

      # ⚡ Декодировать PFX (быстро)
      - name: Decode PFX
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
          [IO.File]::WriteAllBytes("${{ github.workspace }}\cert.pfx", $bytes)

      # ⚡ Импорт PFX (быстро)
      - name: Import PFX
        run: |
          $password = ConvertTo-SecureString "${{ secrets.PFX_PASSWORD }}" -AsPlainText -Force
          Import-PfxCertificate -FilePath "${{ github.workspace }}\cert.pfx" `
            -CertStoreLocation Cert:\LocalMachine\My -Password $password

      # ⚡ Обновление файлов (быстро)
      - name: Update project files
        run: |
          $repoName = "${{ github.repository }}".Split('/')[1]
          $version = "${{ needs.prepare.outputs.VERSION }}"
          
          # Обновить TOKEN
          $content = Get-Content "D:\a\$repoName\$repoName\VK UI3\StaticParams.cs"
          $content = $content -replace 'Environment.GetEnvironmentVariable\("TOKEN_STAT_SLY"\)', '"${{ secrets.TOKEN_STAT_SLY }}"'
          Set-Content "D:\a\$repoName\$repoName\VK UI3\StaticParams.cs" -Value $content
          
          # Обновить версию
          $manifest = "D:\a\$repoName\$repoName\VK UI3 (Package)\Package.appxmanifest"
          [xml]$xml = Get-Content $manifest
          $xml.Package.Identity.Version = $version
          $xml.Save($manifest)
          
          # Обновить Thumbprint
          $cert = Get-PfxCertificate -FilePath "${{ github.workspace }}\cert.pfx" `
            -Password (ConvertTo-SecureString "${{ secrets.PFX_PASSWORD }}" -AsPlainText -Force)
          $projectFile = "VK UI3 (Package)/VK UI3 (Package).wapproj"
          $content = Get-Content $projectFile -Raw
          $content = $content -replace '(?<=<PackageCertificateThumbprint>).+?(?=</PackageCertificateThumbprint>)', $cert.Thumbprint
          Set-Content $projectFile -Value $content

      # ⚡ Восстановление зависимостей (только если нет кэша)
      - name: Restore dependencies
        if: steps.nuget_cache.outputs.cache-hit != 'true'
        run: |
          msbuild "VK UI3 (Package)/VK UI3 (Package).wapproj" /t:Restore /p:Configuration=Release /clp:ErrorsOnly
          msbuild "VK UI3/VK UI3.csproj" /t:Restore /p:Configuration=Unpacked /clp:ErrorsOnly

      # ⚡ Сохранить подготовленные файлы (быстро)
      - name: Upload prepared files
        uses: actions/upload-artifact@v4
        with:
          name: prepared-files
          path: |
            ${{ github.workspace }}\cert.pfx
            VK UI3\StaticParams.cs
            "VK UI3 (Package)\Package.appxmanifest"
            "VK UI3 (Package)\VK UI3 (Package).wapproj"
          retention-days: 1
          if-no-files-found: error

  # ============ JOB 3: Быстрая матричная сборка ============
  build:
    needs: [prepare, setup]
    runs-on: windows-latest
    if: needs.prepare.outputs.SOURCE_CHANGED == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        platform: [x64, x86, ARM64]
        build_type: [msix, exe]
      fail-fast: false
      max-parallel: 3  # ⚡ Ограничиваем параллельность для скорости
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ⚡ Восстановление кэша (быстрое)
      - name: Restore NuGet cache
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # ⚡ Восстановление MSBuild
      - name: Restore MSBuild
        uses: actions/cache@v3
        with:
          path: |
            C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin
          key: msbuild-${{ runner.os }}-${{ hashFiles('**/*.wapproj') }}
          restore-keys: |
            msbuild-${{ runner.os }}-

      # ⚡ Быстрая установка .NET (если кэш не сработал)
      - name: Setup .NET (fallback)
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ⚡ Быстрая установка MSBuild (fallback)
      - name: Setup MSBuild (fallback)
        if: steps.cache.outputs.cache-hit != 'true'
        uses: microsoft/setup-msbuild@v2

      - name: Restore prepared files
        uses: actions/download-artifact@v4
        with:
          name: prepared-files
          path: ${{ github.workspace }}

      # ⚡ Сборка MSIX (оптимизирована)
      - name: Build MSIX for ${{ matrix.platform }}
        if: matrix.build_type == 'msix'
        run: |
          $certPath = "${{ github.workspace }}\cert.pfx"
          msbuild "VK UI3 (Package)" `
            /p:Configuration=Release `
            /p:Platform=${{ matrix.platform }} `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxBundle=Never `
            /p:PackageCertificateKeyFile="$certPath" `
            /p:PackageCertificatePassword="${{ secrets.PFX_PASSWORD }}" `
            /p:AppxPackageDir="Packages\" `
            /p:GenerateAppxPackageOnBuild=true `
            /p:TOKEN_STAT_SLY="${{ secrets.TOKEN_STAT_SLY }}" `
            /p:EnableNETAnalyzers=false `
            /p:WarningLevel=0 `
            /p:TreatWarningsAsErrors=false `
            /p:MaxCpuCount=4 `
            /m:4 `
            /clp:ErrorsOnly
        env:
          TOKEN_STAT_SLY: ${{ secrets.TOKEN_STAT_SLY }}

      # ⚡ Перемещение MSIX файлов (быстро)
      - name: Move MSIX files for ${{ matrix.platform }}
        if: matrix.build_type == 'msix'
        run: |
          Get-ChildItem "VK UI3 (Package)\Packages\*.cer" -Recurse | Rename-Item -NewName "Certificate.cer"
          Get-ChildItem "VK UI3 (Package)\Packages\*.msix" -Recurse | Move-Item -Destination "VK UI3 (Package)\Packages\" -Force

      - name: Upload MSIX for ${{ matrix.platform }}
        if: matrix.build_type == 'msix'
        uses: actions/upload-artifact@v4
        with:
          name: MSIX_${{ matrix.platform }}
          path: |
            VK UI3 (Package)\Packages\*.cer
            VK UI3 (Package)\Packages\*.msixbundle
            VK UI3 (Package)\Packages\*.msix
          retention-days: 30
          compression-level: 0  # ⚡ Без сжатия для скорости

      # ⚡ Сборка EXE (оптимизирована)
      - name: Build EXE for ${{ matrix.platform }}
        if: matrix.build_type == 'exe'
        run: |
          $runtimeMap = @{'x64'='win-x64'; 'x86'='win-x86'; 'ARM64'='win-arm64'}
          msbuild "VK UI3\VK UI3.csproj" `
            /p:Configuration=Unpacked `
            /p:Platform=${{ matrix.platform }} `
            /p:RuntimeIdentifier=$runtimeMap['${{ matrix.platform }}'] `
            /restore:False `
            /p:DisableRuntimeIdentifierInference=true `
            /p:EnableNETAnalyzers=false `
            /p:WarningLevel=0 `
            /p:TreatWarningsAsErrors=false `
            /p:MaxCpuCount=4 `
            /m:4 `
            /clp:ErrorsOnly

      # ⚡ Подпись EXE (оптимизирована)
      - name: Sign EXE for ${{ matrix.platform }}
        if: matrix.build_type == 'exe'
        run: |
          $certPath = "${{ github.workspace }}\cert.pfx"
          $password = "${{ secrets.PFX_PASSWORD }}"
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
                      Where-Object { $_.FullName -match 'x64' } |
                      Select-Object -First 1 -ExpandProperty FullName
          $exe = Get-ChildItem "VK UI3\bin\${{ matrix.platform }}\Unpacked" -Include *.exe | Select-Object -First 1
          & $signtool sign /f $certPath /p $password /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exe.FullName

      # ⚡ Упаковка EXE (быстрая)
      - name: Package EXE for ${{ matrix.platform }}
        if: matrix.build_type == 'exe'
        run: |
          $buildDir = "VK UI3\bin\${{ matrix.platform }}\Unpacked"
          Compress-Archive -Path "$buildDir\*" -DestinationPath "VK_UI3_${{ matrix.platform }}.zip" -CompressionLevel Fastest

      - name: Upload EXE for ${{ matrix.platform }}
        if: matrix.build_type == 'exe'
        uses: actions/upload-artifact@v4
        with:
          name: EXE_${{ matrix.platform }}
          path: VK_UI3_${{ matrix.platform }}.zip
          retention-days: 30
          compression-level: 0

  # ============ JOB 4: Релиз ============
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: github.event.inputs.release == 'true'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.VERSION }}
          name: ${{ github.event.inputs.namevers }}
          body: |
            ${{ github.event.inputs.descr }}
            
            ## 📋 Изменения:
            ${{ needs.prepare.outputs.CHANGELOG }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}

      - name: Telegram notification
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          VERSION="${{ needs.prepare.outputs.VERSION }}"
          URL="https://github.com/${{ github.repository }}/releases/tag/$VERSION"
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="🎉 Новый релиз: ${{ github.event.inputs.namevers }}\n📦 Версия: $VERSION\n🔗 $URL" \
            -d parse_mode="HTML"
name: Автосборка Music M

on:
  workflow_dispatch:
    inputs:
      namevers:
        description: "Название релиза"
        required: true
        default: "🤖 Автосборка"
      descr:
        description: "Описание релиза"
        required: true
        default: "❌ Описание сборки отсутствует"
      release:
        description: "Выкинуть в релиз?"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Пререлиз?"
        required: true
        default: true
        type: boolean

  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============ JOB 1: Подготовка ============
  prepare:
    runs-on: windows-latest
    outputs:
      VERSION: ${{ steps.get_version.outputs.VERSION }}
      CACHE_KEY: ${{ steps.cache_key.outputs.CACHE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Извлечь версию
        id: get_version
        run: |
          $repoName = "${{ github.repository }}".Split('/')[1]
          $csprojPath = "D:\a\$repoName\$repoName\VK UI3\VK UI3.csproj"
          $doc = New-Object xml
          $doc.Load((Convert-Path $csprojPath))
          $version = $doc.SelectSingleNode('//AppxPackageVersion').InnerText
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Версия: $version"

      - name: Сгенерировать ключ кэша
        id: cache_key
        run: |
          $repoName = "${{ github.repository }}".Split('/')[1]
          $csprojPath = "D:\a\$repoName\$repoName\VK UI3\VK UI3.csproj"
          $hash = Get-FileHash -Path $csprojPath -Algorithm MD5
          $key = "dotnet-8-$($hash.Hash)-${{ runner.os }}"
          echo "CACHE_KEY=$key" >> $env:GITHUB_OUTPUT
          echo "Ключ кэша: $key"

  # ============ JOB 2: Установка зависимостей и кэширование ============
  setup:
    needs: prepare
    runs-on: windows-latest
    outputs:
      CACHE_KEY: ${{ needs.prepare.outputs.CACHE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Установить .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Установить MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Декодировать PFX сертификат
        run: |
          $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
          $certificatePath = "${{ github.workspace }}\GitHubActionsWorkflow.pfx"
          [IO.File]::WriteAllBytes("$certificatePath", $pfx_cert_byte)

      - name: Импортировать PFX сертификат
        run: |
          $certificatePath = "${{ github.workspace }}\GitHubActionsWorkflow.pfx"
          $password = ConvertTo-SecureString -String "${{ secrets.PFX_PASSWORD }}" -Force -AsPlainText
          Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\LocalMachine\My -Password $password

      - name: Обновить TOKEN_STAT_SLY
        run: |
          $repoName = "${{ github.repository }}".Split('/')[1]
          $content = Get-Content -Path "D:\a\$repoName\$repoName\VK UI3\StaticParams.cs"
          $updatedContent = $content -replace 'Environment.GetEnvironmentVariable\("TOKEN_STAT_SLY"\)', '"${{ secrets.TOKEN_STAT_SLY }}"'
          Set-Content -Path "D:\a\$repoName\$repoName\VK UI3\StaticParams.cs" -Value $updatedContent

      - name: Подставить версию в Package.appxmanifest
        run: |
          $repoName = "${{ github.repository }}".Split('/')[1]
          $version = "${{ needs.prepare.outputs.VERSION }}"
          $manifest = "D:\a\$repoName\$repoName\VK UI3 (Package)\Package.appxmanifest"
          [xml]$xml = Get-Content $manifest
          $xml.Package.Identity.Version = $version
          $xml.Save($manifest)

      - name: Получить Thumbprint сертификата
        run: |
          $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
          $certificatePath = "${{ github.workspace }}\GitHubActionsWorkflow.pfx"
          [IO.File]::WriteAllBytes("$certificatePath", $pfx_cert_byte)
          $pfxPassword = ConvertTo-SecureString -String "${{ secrets.PFX_PASSWORD }}" -AsPlainText -Force
          $pfxCert = Get-PfxCertificate -FilePath $certificatePath -Password $pfxPassword
          $projectFile = "VK UI3 (Package)/VK UI3 (Package).wapproj"
          $content = Get-Content -Path $projectFile -Raw
          $content = $content -replace '(?<=<PackageCertificateThumbprint>).+?(?=</PackageCertificateThumbprint>)', $pfxCert.Thumbprint
          Set-Content -Path $projectFile -Value $content

      - name: Восстановить зависимости
        run: |
          msbuild "VK UI3 (Package)/VK UI3 (Package).wapproj" /t:Restore /p:Configuration=Release /clp:Minimal
          msbuild "VK UI3/VK UI3.csproj" /t:Restore /p:Configuration=Unpacked /clp:Minimal

      - name: Кэшировать зависимости
        uses: actions/cache@v3
        with:
          path: |
            ~/.nuget/packages
            C:\ProgramData\Microsoft\VisualStudio\Packages
            C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild
            C:\Program Files\dotnet\sdk
          key: ${{ needs.prepare.outputs.CACHE_KEY }}
          restore-keys: |
            ${{ needs.prepare.outputs.CACHE_KEY }}

      - name: Кэшировать сертификат
        uses: actions/cache@v3
        with:
          path: |
            ${{ github.workspace }}\GitHubActionsWorkflow.pfx
          key: cert-${{ secrets.BASE64_ENCODED_PFX }}-${{ secrets.PFX_PASSWORD }}
          restore-keys: |
            cert-${{ secrets.BASE64_ENCODED_PFX }}-${{ secrets.PFX_PASSWORD }}

      - name: Загрузить подготовленные файлы
        uses: actions/upload-artifact@v4
        with:
          name: prepared-files
          path: |
            ${{ github.workspace }}\GitHubActionsWorkflow.pfx
            VK UI3\StaticParams.cs
            "VK UI3 (Package)\Package.appxmanifest"
            "VK UI3 (Package)\VK UI3 (Package).wapproj"
          retention-days: 1

  # ============ JOB 3: Сборка MSIX x64 ============
  build_msix_x64:
    needs: [prepare, setup]
    runs-on: windows-latest
    env:
      Solution_Name: "VK UI3 (Package)"
      Configuration: Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Восстановить зависимости из кэша
        uses: actions/cache@v3
        with:
          path: |
            ~/.nuget/packages
            C:\ProgramData\Microsoft\VisualStudio\Packages
            C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild
            C:\Program Files\dotnet\sdk
          key: ${{ needs.prepare.outputs.CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Установить .NET Core (если кэш не сработал)
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Установить MSBuild (если кэш не сработал)
        if: steps.cache.outputs.cache-hit != 'true'
        uses: microsoft/setup-msbuild@v2

      - name: Восстановить подготовленные файлы
        uses: actions/download-artifact@v4
        with:
          name: prepared-files
          path: ${{ github.workspace }}

      - name: Восстановить сертификат из кэша
        uses: actions/cache@v3
        with:
          path: |
            ${{ github.workspace }}\GitHubActionsWorkflow.pfx
          key: cert-${{ secrets.BASE64_ENCODED_PFX }}-${{ secrets.PFX_PASSWORD }}
          fail-on-cache-miss: true

      - name: Собрать MSIX x64
        run: |
          $certificatePath = "${{ github.workspace }}\GitHubActionsWorkflow.pfx"
          msbuild "$env:Solution_Name" `
            /p:Configuration=$env:Configuration `
            /p:Platform=x64 `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxBundle=Never `
            /p:PackageCertificateKeyFile="$certificatePath" `
            /p:PackageCertificatePassword="${{ secrets.PFX_PASSWORD }}" `
            /p:AppxPackageDir="Packages\" `
            /p:GenerateAppxPackageOnBuild=true `
            /p:TOKEN_STAT_SLY="${{ secrets.TOKEN_STAT_SLY }}" `
            /p:EnableNETAnalyzers=false `
            /p:WarningLevel=0 `
            /p:TreatWarningsAsErrors=false `
            /clp:ErrorsOnly
        env:
          TOKEN_STAT_SLY: ${{ secrets.TOKEN_STAT_SLY }}

      - name: Переименовать .cer файл
        run: |
          Get-ChildItem -Path "${{ env.Solution_Name }}\\Packages" -Filter *.cer -Recurse -Depth 1 | ForEach-Object {
            Rename-Item -Path $_.FullName -NewName "Certificate.cer"
          }

      - name: Переместить файлы в Packages
        run: |
          $fileTypes = "*.msix", "*.cer", "*.msixbundle"
          foreach ($fileType in $fileTypes) {
            Get-ChildItem -Path "${{ env.Solution_Name }}\\Packages" -Filter $fileType -Recurse -Depth 1 | ForEach-Object {
              $destinationFile = "${{ env.Solution_Name }}\\Packages\\" + $_.Name
              if (-Not (Test-Path -Path $destinationFile)) {
                Move-Item -Path $_.FullName -Destination $destinationFile
              }
            }
          }

      - name: Загрузить MSIX x64
        uses: actions/upload-artifact@v4
        with:
          name: MSIX_Package_x64
          path: |
            ${{ env.Solution_Name }}\\Packages\*.cer
            ${{ env.Solution_Name }}\\Packages\*.msixbundle
            ${{ env.Solution_Name }}\\Packages\*.msix
          retention-days: 30


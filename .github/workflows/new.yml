  # ============ JOB 5: Сборка EXE (x64) ============
  build_exe_x64:
    needs: prepare
    runs-on: windows-latest
    env:
      Solution_Name_Unpacked: "VK UI3"
      Configuration_unpacked: Unpacked
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode PFX
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.BASE64_ENCODED_PFX }}")
          $certPath = "${{ github.workspace }}\signcert.pfx"
          [IO.File]::WriteAllBytes($certPath, $bytes)

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2

      - name: Build EXE x64
        run: |
          msbuild "$env:Solution_Name_Unpacked\$env:Solution_Name_Unpacked.csproj" `
            "/p:Configuration=$env:Configuration_unpacked" `
            "/p:Platform=x64" `
            "/p:RuntimeIdentifier=win-x64" `
            /restore `
            /p:DisableRuntimeIdentifierInference=true `
            /p:EnableNETAnalyzers=false `
            /p:WarningLevel=0 `
            /p:TreatWarningsAsErrors=false `
            /clp:ErrorsOnly

      - name: Sign exe x64
        run: |
          $certPath = "${{ github.workspace }}\signcert.pfx"
          $password = "${{ secrets.PFX_PASSWORD }}"
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
                      Where-Object { $_.FullName -match 'x64' } |
                      Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe не найден" }
          $exe = Get-ChildItem "$env:Solution_Name_Unpacked\bin\x64\$env:Configuration_unpacked" -Recurse -Include *.exe | Select-Object -First 1
          if (-not $exe) { throw "Не найден exe для x64" }
          & $signtool sign /f $certPath /p $password /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exe.FullName

      - name: Package build folder x64
        run: |
          $buildDir = Join-Path "$env:Solution_Name_Unpacked\bin" "x64\$env:Configuration_unpacked"
          if (-not (Test-Path $buildDir)) { throw "Папка сборки для x64 не найдена" }
          $zipName = "VK_UI3_x64.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "$buildDir\*" -DestinationPath $zipName -Force

      - name: Upload EXE x64
        uses: actions/upload-artifact@v4
        with:
          name: EXE_x64
          path: VK_UI3_x64.zip
          retention-days: 30

